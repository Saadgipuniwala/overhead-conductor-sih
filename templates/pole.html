<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pole Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pole.css') }}">

  <script>
    // Fetch live LoRa data
    async function fetchData() {
      try {
        const res = await fetch("/data");
        const data = await res.json();
        document.getElementById("raw").innerText = data.raw || "No data yet";
        document.getElementById("payload").innerText = data.payload || "-";
        document.getElementById("rssi").innerText = data.rssi || "-";
        document.getElementById("snr").innerText = data.snr || "-";
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }
    setInterval(fetchData, 2000);
    window.onload = fetchData;

    // Assign task
    async function assignTask() {
      const staff = document.getElementById("staffSelect").value;
      const dueDate = document.getElementById("dueDate").value;
      const payload = {
        staff: staff,
        pole_id: "{{ poleId }}",
        location: "{{ location }}",
        due_date: dueDate
      };

      const res = await fetch("/assign-task", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      document.getElementById("assignMsg").innerText = result.message;
    }
  </script>
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="team-name">SYNKTRA</div>
    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('staff_management') }}">Staff Management</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
  </header>

  <!-- Live LoRa Data -->
  <h1>📡 LoRa Receiver Dashboard</h1>
  <p><b>Raw:</b> <span id="raw">-</span></p>
  <p><b>Payload:</b> <span id="payload">-</span></p>
  <p><b>RSSI:</b> <span id="rssi">-</span></p>
  <p><b>SNR:</b> <span id="snr">-</span></p>

  <!-- Pole Details & Assignment -->
  <main class="container">
    <h2>Pole Details</h2>
    <div id="poleDetails">
      <p><b>Pole ID:</b> {{ poleId }}</p>
      <p><b>Location:</b> {{ location }}</p>
    </div>

    <div id="mapArea"></div>

    <section class="assign-section">
      <h3>Assign Task</h3>
      <label>Date: <input type="date" id="dueDate" required></label>
      <label>Choose Staff:
        <select id="staffSelect" required>
          <option value="">-- Select Staff --</option>
          {% for staff in staff_list %}
            <option value="{{ staff.username }}">{{ staff.fullname }}</option>
          {% endfor %}
        </select>
      </label>
      <button onclick="assignTask()">Assign</button>
      <div id="assignMsg"></div>
    </section>
  </main>

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/pole.js') }}"></script>
</body>
</html>
